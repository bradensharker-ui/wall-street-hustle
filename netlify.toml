# Netlify deployment config. Connect this repo in the Netlify dashboard and
# every push to `main` builds & publishes automatically.

[build]
  command = "npm run build"
  publish = "dist"

[functions]
  # Bundle ES modules so we can import @netlify/blobs from session.js.
  node_bundler = "esbuild"

# Session API — friendly URL routed to the Netlify Function. The function's
# `config.path` also lists this so direct invocations of /api/session/:seed
# reach it regardless of redirect ordering.
[[redirects]]
  from = "/api/session/*"
  to = "/.netlify/functions/session/:splat"
  status = 200
  force = true

# SPA fallback — every other unknown route serves index.html so the React app
# can handle its own routing. Must come AFTER the /api/* rule above.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Sane security headers — this app collects no PII and makes no network calls,
# but defense in depth costs nothing.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
